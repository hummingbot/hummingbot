name: ci

on:
  push:
    branches: [master, development, 'refactor/unit_tests**', 'epic/**']
  pull_request:
    branches: [master, development, 'refactor/unit_tests**', 'epic/**']
    types: [ready_for_review, opened, synchronize, reopened]

jobs:
  run_client:
    name: Check if client files changed
    outputs:
      is_set: ${{ steps.check_files.outputs.is_set }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/*.+(py|pyx|pyd|yml)
      - name: Check if client files are modified
        id: check_files
        if: env.GIT_DIFF
        run: |
          echo ${{ env.GIT_DIFF }}
          echo "is_set=true" >> $GITHUB_OUTPUT

  build_hummingbot:
    name: Hummingbot build + stable tests
    needs: run_client
    if: github.event.pull_request.draft == false && needs.run_client.outputs.is_set == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      # Use cache's hashFiles function to check for changes in core code
      - name: Check for code changes
        id: program-changes
        uses: actions/cache@v5
        env:
          CACHE_NUMBER: 0
        with:
          path: README.md # placeholder file
          key: ${{ runner.os }}-build-${{ env.CACHE_NUMBER }}-${{ hashFiles('hummingbot/*', '**/*.py', '**/*.py*', '**/*.pxd', 'test/*') }}

      - name: Set up pixi
        if: steps.program-changes.outputs.cache-hit != 'true'
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: ci
          cache: true
          locked: false

      # Build (install + compile Cython extensions)
      - name: Build Hummingbot
        if: steps.program-changes.outputs.cache-hit != 'true'
        run: pixi run -e ci build

      # Run pre-commit hooks on changed files
      - name: Run pre-commit hooks on diff
        if: steps.program-changes.outputs.cache-hit != 'true'
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            pixi run -e ci pre-commit run --files $(git diff --name-only origin/${{ github.base_ref }})
          else
            pixi run -e ci pre-commit run --files $(git diff --name-only HEAD~1)
          fi

      # Run tests with coverage
      - name: Run stable tests and calculate coverage
        if: steps.program-changes.outputs.cache-hit != 'true'
        run: |
          pixi run -e ci coverage run -m pytest \
            --ignore="test/mock" \
            --ignore="test/hummingbot/connector/exchange/ndax/" \
            --ignore="test/hummingbot/connector/derivative/dydx_v4_perpetual/" \
            --ignore="test/hummingbot/remote_iface/" \
            --ignore="test/connector/utilities/oms_connector/" \
            --ignore="test/hummingbot/strategy/amm_arb/" \
            --ignore="test/hummingbot/strategy/cross_exchange_market_making/"

      - name: Check and report global coverage
        if: steps.program-changes.outputs.cache-hit != 'true'
        run: |
          pixi run -e ci coverage report
          pixi run -e ci coverage html

      - name: Validate coverage for the changes
        if: github.event_name == 'pull_request' && steps.program-changes.outputs.cache-hit != 'true'
        run: |
          git fetch --all -q
          git checkout -b $GITHUB_SHA
          pixi run -e ci coverage xml
          pixi run -e ci diff-cover --compare-branch=origin/$GITHUB_BASE_REF --fail-under=80 coverage.xml

      # Notify results to discord
      - name: Discord Webhook Action
        id: discord-direct-webhook
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          raw-data: ${{ matrix.target }}-build_report.json

      # Notify results to discord
      - uses: ruby/setup-ruby@v1
        if: github.event_name != 'pull_request' && steps.discord-direct-webhook.outcome == 'failure'
      - name: Send Webhook Notification
        if: github.event_name != 'pull_request' && steps.discord-direct-webhook.outcome == 'failure'
        env:
          JOB_STATUS: ${{ job.status }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          HOOK_OS_NAME: ${{ runner.os }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          git clone --depth 1 https://github.com/DiscordHooks/github-actions-discord-webhook.git webhook
          bash webhook/send.sh $JOB_STATUS $WEBHOOK_URL
        shell: bash
