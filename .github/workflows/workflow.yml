name: ci

on:
  push:
    branches: [master, development, 'refactor/unit_tests**', 'epic/**']
  pull_request:
    branches: [master, development, 'refactor/unit_tests**', 'epic/**']
    types: [ready_for_review, opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changes
    outputs:
      has_changes: ${{ steps.check_files.outputs.is_set }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/*.+(py|pyx|pyd|yml)
      - name: Check if client files are modified
        id: check_files
        if: env.GIT_DIFF
        run: |
          echo ${{ env.GIT_DIFF }}
          echo "is_set=true" >> $GITHUB_OUTPUT

  quality:
    name: Quality gates
    needs: detect-changes
    if: github.event.pull_request.draft == false && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: ci
          cache: true
          locked: false

      - name: Run pre-commit hooks on diff
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            pixi run -e ci pre-commit run --files $(git diff --name-only origin/${{ github.base_ref }} | grep -v '^sub-packages/')
          else
            pixi run -e ci pre-commit run --files $(git diff --name-only HEAD~1 | grep -v '^sub-packages/')
          fi

      - name: Lint check
        run: pixi run -e ci lint

      - name: Format check
        run: pixi run -e ci format-check

      - name: Type check
        run: pixi run -e ci type-check
        continue-on-error: true

  test:
    name: Build + Test
    needs: detect-changes
    if: github.event.pull_request.draft == false && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: ci
          cache: true
          locked: false

      - name: Build Hummingbot
        run: pixi run -e ci build

      - name: Run tests with coverage
        run: |
          pixi run -e ci coverage run -m pytest \
            --timeout=30 \
            --ignore="test/mock" \
            --ignore="test/hummingbot/connector/exchange/ndax/" \
            --ignore="test/hummingbot/connector/derivative/dydx_v4_perpetual/" \
            --ignore="test/hummingbot/connector/exchange/vertex/" \
            --ignore="test/hummingbot/remote_iface/" \
            --ignore="test/connector/utilities/oms_connector/" \
            --ignore="test/hummingbot/strategy/amm_arb/" \
            --ignore="test/hummingbot/strategy/cross_exchange_market_making/"

      - name: Coverage report
        run: |
          pixi run -e ci coverage report
          pixi run -e ci coverage html

      - name: Diff-cover (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --all -q
          git checkout -b $GITHUB_SHA
          pixi run -e ci coverage xml
          pixi run -e ci diff-cover --compare-branch=origin/$GITHUB_BASE_REF --fail-under=80 coverage.xml

  security:
    name: Security scan
    needs: detect-changes
    if: github.event.pull_request.draft == false && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: ci
          cache: true
          locked: false

      - name: Install package
        run: pixi run -e ci install-dev

      - name: Bandit security scan
        run: pixi run -e ci security-scan
        continue-on-error: true

      - name: Dependency audit
        run: pixi run -e ci dependency-scan
        continue-on-error: true

  sub-packages-compat:
    name: Sub-packages compatibility
    needs: detect-changes
    if: github.event.pull_request.draft == false && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: ci
          cache: true
          locked: false

      - name: Import smoke test
        run: pixi run -e ci compat-import

      - name: Interface contract check
        run: pixi run -e ci compat-contract

      - name: Integration compatibility tests
        run: pixi run -e ci compat-integration

  ci-success:
    name: CI Success
    if: always()
    needs: [quality, test, security, sub-packages-compat]
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.quality.result }}" == "failure" ] || [ "${{ needs.test.result }}" == "failure" ] || [ "${{ needs.sub-packages-compat.result }}" == "failure" ]; then
            echo "Required jobs failed"
            exit 1
          fi
          echo "All required checks passed (security is informational)"

      - uses: ruby/setup-ruby@v1
        if: always()
        with:
          ruby-version: '3.3'
      - name: Send Webhook Notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          HOOK_OS_NAME: ${{ runner.os }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          git clone --depth 1 https://github.com/DiscordHooks/github-actions-discord-webhook.git webhook
          bash webhook/send.sh $JOB_STATUS $WEBHOOK_URL
        shell: bash
