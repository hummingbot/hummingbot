services:
  hummingbot:
    container_name: hummingbot
    image: hummingbot/hummingbot:latest
    # build: # Uncomment this build section and comment image to build Hummingbot locally
    #   context: .
    #   dockerfile: Dockerfile
    volumes:
      - ./conf:/home/hummingbot/conf
      - ./conf/connectors:/home/hummingbot/conf/connectors
      - ./conf/strategies:/home/hummingbot/conf/strategies
      - ./conf/controllers:/home/hummingbot/conf/controllers
      - ./conf/scripts:/home/hummingbot/conf/scripts
      - ./logs:/home/hummingbot/logs
      - ./data:/home/hummingbot/data
      - ./certs:/home/hummingbot/certs
      - ./scripts:/home/hummingbot/scripts
      - ./controllers:/home/hummingbot/controllers
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    tty: true
    stdin_open: true
    network_mode: host
    # Run as an idle "hbot host": the container stays up and you drive it with `hbot` commands — the
    # same way as a source install. Use the host wrapper (`make link-cli`, then `hbot <command>`) or
    # `docker exec -it hummingbot hbot <command>`.
    #   - for one dedicated bot instead:      command: hbot start <config> --foreground
    #   - for the legacy interactive client:  remove this command, then `docker attach hummingbot`
    command: tail -f /dev/null
  #  environment:
  #    - HBOT_PASSWORD=admin

  gateway:
   profiles: ["gateway"]
   restart: always
   container_name: gateway
   image: hummingbot/gateway:latest
   ports:
     - "15888:15888"
   volumes:
     - "./gateway-files/conf:/home/gateway/conf"
     - "./gateway-files/logs:/home/gateway/logs"
     - "./certs:/home/gateway/certs"
   environment:
     - GATEWAY_PASSPHRASE=admin
     - DEV=true
