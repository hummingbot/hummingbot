repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
        exclude: '\.(pyx|pxd)$|^sub-packages/'
      - id: ruff-format
        exclude: '\.(pyx|pxd)$|^sub-packages/'
  # cython-lint disabled: hundreds of pre-existing violations in legacy .pyx files
  # Run manually via: pixi run lint-cython
  # - repo: https://github.com/MarcoGorelli/cython-lint
  #   rev: v0.16.0
  #   hooks:
  #     - id: cython-lint
  - repo: https://github.com/CoinAlpha/git-hooks
    rev: 78f0683233a09c68a072fd52740d32c0376d4f0f
    hooks:
      - id: detect-wallet-private-key
        types: [file]
        exclude: .json
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        files: "\\.(py)$"
        args: [--settings-path=pyproject.toml]
