# === Controller identity ===
controller_type: generic
controller_name: binary_options
id: binary_options_main

# === Connection ===
connector_name: limitless
trading_pair: ETH-USDC
paper_mode: true               # true = log orders only, false = real trading

# === Market selection ===
coins: [ETH]                   # Only trade these coins (empty = all discovered)
max_expiry_hours: 1.0          # Look-ahead window for market discovery
include_subhourly: false       # false = hourly (:00) only, true = include :15/:30/:45 too
switch_policy: flat_only

# === Budget ===
total_amount_quote: 100.0

# === Runtime config paths ===
runtime_json_path: /home/tiger/.openclaw/workspace/skills/limitless-recon/data/runtime.json
config_json_path: /home/tiger/.openclaw/workspace/skills/limitless-recon/config.json

# === Signal engine ===
poll_interval_ms: 1500
vol_warmup_ticks: 20

# === Action routing ===
routing:
  entry_mode: limit
  taker_edge_threshold: 0.15
  taker_time_threshold_min: 5.0
  mint_enabled: false
  mint_min_spread: 0.03
  mint_prefer_over_buy: false
  delta_neutral_enabled: false
  delta_neutral_max_edge: 0.03
  delta_neutral_min_spread: 0.02
  require_signal_agreement: false
  conflict_mode: veto
  conflict_size_mult: 0.5
  exit_mode: limit
  exit_taker_urgency_min: 2.0
  hold_to_settlement: true
  settlement_hold_threshold: 0.70
  max_positions_per_coin: 1
  max_total_positions: 5
  position_size_mode: fixed
  fixed_position_size: 0.1
  max_position_size: 1.0
  edge_size_multiplier: 100.0

# === Market Making (quote_manager) ===
quoting:
  enabled: true
  inner_fraction: 0.2          # 20% of reward spread = closest to mid
  outer_fraction: 0.9          # 90% of reward spread = widest before pull
  skew_sensitivity: 0.5        # model disagreement → tunnel asymmetry
  base_size: 0.1               # shares per order (dust testing)
  max_size: 1.0                # max shares per order
  reprice_threshold: 0.01      # reprice when fair value drifts by this much
  odds_min: 0.05               # don't quote below 5%
  odds_max: 0.95               # don't quote above 95%
  min_hours_for_quoting: 0.083  # 5 min — don't quote near expiry
  max_capital_per_market: 1.0  # USDC per market (dust testing)
  max_total_capital: 2.0       # USDC total across all markets
