# Logrotate configuration for Hummingbot WEEX system
# To install: sudo cp logrotate.conf /etc/logrotate.d/hummingbot-weex
# To test: sudo logrotate -d /etc/logrotate.d/hummingbot-weex
# To force rotation: sudo logrotate -f /etc/logrotate.d/hummingbot-weex

# Market Making Bot Logs
/home/jkovacs/git/hummingbot/logs/mm/*.log {
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    missingok
    create 0640 jkovacs jkovacs
}

# Volume Generator Bot Logs
/home/jkovacs/git/hummingbot/logs/vol/*.log {
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    missingok
    create 0640 jkovacs jkovacs
}

# Monitor Service Logs
/home/jkovacs/git/hummingbot/logs/monitor/*.log {
    daily
    rotate 7
    compress
    delaycompress
    notifempty
    missingok
    create 0640 jkovacs jkovacs
}

# Data Files (order book snapshots, trades)
/home/jkovacs/git/hummingbot/data/*.txt {
    weekly
    rotate 4
    compress
    delaycompress
    notifempty
    missingok
    create 0640 jkovacs jkovacs
    su jkovacs jkovacs
}
